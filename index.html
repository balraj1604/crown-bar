<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crown Bar — Mega Max 40000</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --c1: #3e6ee9; --c2: #cad6f5; --ink: #121e3f; --accent: #134feb;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --pad: clamp(1.25rem, 3vw, 3rem);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Archivo', system-ui, sans-serif; color: var(--ink);
    background: #111; -webkit-font-smoothing: antialiased; user-select: none;
  }

  /* world */
  .stage {
    position: fixed; inset: 0; display: grid; place-items: center; overflow: hidden;
    background: #0c0610;
  }
  /* crossfading per-flavour background image layers */
  .bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center;
    will-change: opacity, transform; }
  .stage::before { content: ""; position: absolute; inset: 0; z-index: 6; pointer-events: none;
    background: radial-gradient(150% 100% at 50% 50%, transparent 30%, rgba(0,0,0,.45) 100%); }
  /* static grain — no animation / no blend mode (cheap, avoids per-frame full-screen repaint) */
  .stage::after { content: ""; position: absolute; inset: 0; z-index: 7; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
    background-size: 170px 170px; opacity: .045; }

  /* nav */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 20; display: flex;
    align-items: center; justify-content: space-between; padding: var(--pad); color: #fff;
    text-shadow: 0 1px 12px rgba(0,0,0,.5); }
  .brand { font-family: 'Syncopate', sans-serif; font-weight: 700; letter-spacing: .28em;
    font-size: clamp(.85rem, 1.3vw, 1.05rem); display: flex; align-items: center; gap: .55rem; }
  .brand .kanji { font-family: 'Archivo'; font-weight: 900; opacity: .55; }
  .nav-links { display: flex; gap: clamp(1rem, 2.4vw, 2.4rem); }
  .nav-links a, .nav-utils button { font-size: .72rem; letter-spacing: .18em; text-transform: uppercase;
    font-weight: 500; color: #fff; opacity: .85; background: none; border: 0; cursor: pointer;
    transition: opacity .25s; text-decoration: none; }
  .nav-links a:hover, .nav-utils button:hover { opacity: 1; }
  .nav-utils { display: flex; gap: 1.4rem; align-items: center; }
  .cart-pill { display: inline-flex; align-items: center; gap: .4rem; border: 1px solid currentColor;
    border-radius: 100px; padding: .42rem .85rem !important; opacity: .85 !important; }
  .cart-pill .count { background: var(--ink); color: var(--c2); border-radius: 100px;
    font-size: .62rem; padding: .05rem .4rem; line-height: 1.4; }
  .rule { position: fixed; left: var(--pad); right: var(--pad); top: calc(var(--pad) + 2.7rem);
    height: 1px; background: #fff; opacity: .22; z-index: 20; }

  /* giant flavour word (two crossfading layers) */
  .bigword { position: absolute; z-index: 4; top: 50%; left: 50%; will-change: transform; }
  .word { position: absolute; top: 0; left: 0; transform: translate(-50%,-50%);
    font-family: 'Syncopate', sans-serif; font-weight: 700;
    font-size: clamp(4rem, 14vw, 15rem); line-height: .82; letter-spacing: -.02em; white-space: nowrap;
    color: transparent; -webkit-text-stroke: 1.6px rgba(255,255,255,.7); text-align: center;
    will-change: transform, opacity; }

  /* device (two crossfading layers) */
  .device-wrap { position: relative; z-index: 5; height: 100vh; width: 100vw; will-change: transform;
    perspective: 1700px; }
  .device-float { position: absolute; inset: 0; will-change: transform; transform-style: preserve-3d; }
  /* static blurred halo for depth — rendered once, NOT a per-frame filter on the moving device */
  .device-float::before { content: ""; position: absolute; left: 50%; top: 46%; width: 40%; height: 58%;
    transform: translate(-50%,-50%); border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(0,0,0,.5) 0%, transparent 72%);
    filter: blur(45px); z-index: 0; pointer-events: none; }
  .device { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    max-height: 108vh; max-width: 60vw; width: auto; object-fit: contain;
    will-change: transform; backface-visibility: hidden; z-index: 1; }

  /* floating ingredients */
  .elements { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
  .el { position: absolute; will-change: transform; font-size: clamp(1.8rem, 3.4vw, 3.4rem);
    filter: drop-shadow(0 12px 16px rgba(0,0,0,.25)); }

  /* info */
  .info { display: none; position: fixed; left: var(--pad); bottom: clamp(2rem, 6vh, 4.5rem); z-index: 12;
    max-width: min(34vw, 380px); color: var(--ink); }
  .info .eyebrow { font-size: .68rem; letter-spacing: .32em; text-transform: uppercase;
    font-weight: 700; opacity: .65; margin-bottom: .7rem; }
  .info h1 { font-family: 'Syncopate', sans-serif; font-weight: 700;
    font-size: clamp(1.7rem, 3vw, 2.6rem); line-height: 1; letter-spacing: -.01em; margin-bottom: .35rem; }
  .info .jpname { font-size: .82rem; letter-spacing: .18em; opacity: .6; margin-bottom: 1rem; font-weight: 500; }
  .info p { font-size: clamp(.82rem, 1vw, .95rem); line-height: 1.55; opacity: .82; margin-bottom: 1.4rem; max-width: 30ch; }
  .buy { display: inline-flex; align-items: center; gap: .6rem; background: var(--ink); color: var(--c2);
    border: 0; border-radius: 100px; cursor: pointer; padding: .95rem 1.6rem; font-weight: 700;
    font-size: .82rem; letter-spacing: .06em; transition: transform .3s var(--ease), box-shadow .3s var(--ease);
    box-shadow: 0 10px 30px rgba(0,0,0,.22); }
  .buy:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 18px 40px rgba(0,0,0,.3); }
  .buy .price { opacity: .6; font-weight: 500; }

  .puffs { position: fixed; left: var(--pad); top: 42%; transform: translateY(-50%) rotate(-90deg);
    transform-origin: left center; z-index: 8; font-family: 'Syncopate'; font-weight: 700;
    font-size: .72rem; letter-spacing: .4em; opacity: .55; color: #fff; }

  /* selector */
  .selector { position: fixed; right: var(--pad); bottom: clamp(2rem, 6vh, 4.5rem); z-index: 12;
    display: flex; align-items: flex-end; gap: 1.1rem; color: var(--ink); }
  .picks { display: flex; align-items: flex-end; gap: .5rem; max-width: min(52vw, 640px); overflow-x: auto;
    padding: 12px 4px 8px; scroll-behavior: smooth; scrollbar-width: none; }
  .picks::-webkit-scrollbar { display: none; }
  .pick { flex: 0 0 auto; width: 34px; height: 102px; cursor: pointer; background: none; border: 0;
    padding: 0; display: flex; align-items: flex-end; justify-content: center; position: relative; opacity: .45;
    transition: transform .35s var(--ease), opacity .35s; }
  .pick img { height: 100%; max-height: 100%; width: auto; object-fit: contain; filter: drop-shadow(0 4px 7px rgba(0,0,0,.3)); }
  .pick:hover { opacity: .8; transform: translateY(-5px); }
  .pick.active { opacity: 1; transform: translateY(-9px) scale(1.14); }
  .pick.active::after { content: ""; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
    width: 16px; height: 3px; border-radius: 3px; background: var(--ink); }
  .arrows { display: flex; flex-direction: column; gap: .5rem; }
  .arrows button { width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
    border: 1px solid currentColor; background: rgba(255,255,255,.12); color: var(--ink);
    font-size: 1.1rem; display: grid; place-items: center; transition: background .25s, transform .25s; }
  .arrows button:hover { background: rgba(255,255,255,.3); transform: scale(1.08); }

  .counter { position: fixed; right: var(--pad); top: 42%; z-index: 12; font-family: 'Syncopate';
    color: var(--ink); text-align: right; transform: translateY(-50%); }
  .counter .now { font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 700; line-height: 1; }
  .counter .total { font-size: .9rem; opacity: .5; }

  .hint { position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%); z-index: 12;
    font-size: .64rem; letter-spacing: .25em; text-transform: uppercase; opacity: .55; color: #fff; }

  @media (max-width: 820px) {
    .info { max-width: 70vw; } .counter, .puffs, .nav-links { display: none; }
    .device-wrap { height: 52vh; width: 80vw; } .device { max-width: 70vw; max-height: 52vh; }
    .selector { gap: .6rem; } .pick { width: 40px; height: 56px; }
  }
  @media (prefers-reduced-motion: reduce) { .stage::after { animation: none; } }
</style>
</head>
<body>

    <div class="bg" id="bgA"></div>
    <div class="bg" id="bgB" style="opacity:0"></div>
    <div class="bigword" id="bigword">
      <span class="word" id="wordA">BERRY ICE</span>
      <span class="word" id="wordB" style="opacity:0"></span>

    <div class="device-wrap" id="deviceWrap">

        <img class="device" id="devB" src="" alt="" style="opacity:0" />

  <nav>
    <div class="brand"><span class="kanji">煙</span> CROWN&nbsp;BAR</div>
    <div class="nav-links">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  { id:"magic_love", jp:"マジックラブ", name:["Magic","Love"], word:"MAGIC LOVE", eyebrow:"Crown Bar · 07",
    desc:"Sweet mixed-fruit candy with a playful pink heart.", img:"assets/dev_magic_love.png", price:"AED 45",
    c1:"#e93e90", c2:"#f5cadf", ink:"#3f1227", accent:"#eb137b", els:["💗","🍓","🍬","✨","💗","🍃"] },
  { id:"cool_mango", jp:"クールマンゴー", name:["Cool","Mango"], word:"COOL MANGO", eyebrow:"Crown Bar · 08",
    desc:"Ripe Alphonso mango chilled to a smooth, cool exhale.", img:"assets/dev_cool_mango.png", price:"AED 45",

  { id:"mango_pine", jp:"マンゴーパイン", name:["Mango","Pine"], word:"MANGO PINE", eyebrow:"Crown Bar · 09",
    desc:"Tropical mango and pineapple, golden and juicy.", img:"assets/dev_mango_pine.png", price:"AED 45",
    c1:"#e99a3e", c2:"#f5e2ca", ink:"#3f2a12", accent:"#eb8813", els:["🥭","🍍","☀️","💧","🥭","🌴"] },

    desc:"Soft ripe peach over a crisp menthol chill.", img:"assets/dev_peach_ice.png", price:"AED 45",
    c1:"#e96c3e", c2:"#f5d6ca", ink:"#3f1e12", accent:"#eb4d13", els:["🍑","❄️","🍃","💧","🍑","✨"] },

    desc:"Sun-ripened strawberries, sweet and pure.", img:"assets/dev_strawberry.png", price:"AED 45",
    c1:"#e93e48", c2:"#f5cacd", ink:"#3f1215", accent:"#eb1320", els:["🍓","🍓","🍃","💧","🍓","✨"] },
  { id:"two_apple", jp:"トゥーアップル", name:["Two","Apple"], word:"TWO APPLE", eyebrow:"Crown Bar · 12",

  { id:"grape_berry", jp:"グレープベリー", name:["Grape","Berry"], word:"GRAPE BERRY", eyebrow:"Crown Bar · 13",
    desc:"Grape and dark berries layered into a deep sweet pour.", img:"assets/dev_grape_berry.png", price:"AED 45",
    c1:"#e93ece", c2:"#f5caee", ink:"#3f1238", accent:"#eb13c9", els:["🍇","🫐","🍓","✨","🍇","💧"] },
  { id:"orange_mint", jp:"オレンジミント", name:["Orange","Mint"], word:"ORANGE MINT", eyebrow:"Crown Bar · 14",
    desc:"Juicy orange brightened with a cool mint edge.", img:"assets/dev_orange_mint.png", price:"AED 45",
    c1:"#e9863e", c2:"#f5dcca", ink:"#3f2512", accent:"#eb6e13", els:["🍊","🌿","❄️","💧","🍊","🍃"] },
  { id:"blueberry_raspberry", jp:"ブルーベリーラズベリー", name:["Blueberry","Raspberry"], word:"BLUE RASP", eyebrow:"Crown Bar · 15",
    desc:"Wild blueberry and tart raspberry in deep harmony.", img:"assets/dev_blueberry_raspberry.png", price:"AED 45",
    c1:"#603ee9", c2:"#d3caf5", ink:"#1b123f", accent:"#3e13eb", els:["🫐","🍓","✨","💧","🫐","🍃"] },
  { id:"blueberry_sour", jp:"ブルーベリーサワー", name:["Blueberry","Sour"], word:"BLUE SOUR", eyebrow:"Crown Bar · 16",
    desc:"Blueberry with a sour candy kick that zings.", img:"assets/dev_blueberry_sour.png", price:"AED 45",
    c1:"#3e9ce9", c2:"#cae2f5", ink:"#122b3f", accent:"#138aeb", els:["🫐","🍋","⚡","💧","🫐","🍬"] },
  { id:"pineapple_ice", jp:"パイナップルアイス", name:["Pineapple","Ice"], word:"PINEAPPLE", eyebrow:"Crown Bar · 17",

  { id:"watermelon_pine", jp:"ウォーターメロンパイン", name:["Watermelon","Pine"], word:"WATERMELON", eyebrow:"Crown Bar · 18",

    c1:"#e93e5d", c2:"#f5cad2", ink:"#3f121a", accent:"#eb133a", els:["🍉","🍍","🍃","💧","🍉","🌴"] },
  { id:"summer_dream", jp:"サマードリーム", name:["Summer","Dream"], word:"SUMMER DREAM", eyebrow:"Crown Bar · 19",
    desc:"A cool tropical cocktail of fruit and sea breeze.", img:"assets/dev_summer_dream.png", price:"AED 45",
    c1:"#3ee9e9", c2:"#caf5f5", ink:"#123f3f", accent:"#13ebeb", els:["🏝️","🌊","☀️","🍹","🌴","💧"] },
  { id:"blueberry_lemonade", jp:"ブルーベリーレモネード", name:["Blueberry","Lemonade"], word:"BLUE LEMONADE", eyebrow:"Crown Bar · 20",
    desc:"Blueberry swirled into tart, fizzy lemonade.", img:"assets/dev_blueberry_lemonade.png", price:"AED 45",
    c1:"#3e78e9", c2:"#cad9f5", ink:"#12213f", accent:"#135ceb", els:["🫐","🍋","🧊","💧","🫐","✨"] },
];

const $ = s => document.querySelector(s);
const stage=$("#stage"), bigword=$("#bigword"),
      wordA=$("#wordA"), wordB=$("#wordB"), devA=$("#devA"), devB=$("#devB"),
      elements=$("#elements"), title=$("#title"), desc=$("#desc"), eyebrow=$("#eyebrow"),
      jpname=$("#jpname"), buyPrice=$(".buy .price"), counterNow=$("#counterNow"), picksWrap=$("#picks"),
      bgA=$("#bgA"), bgB=$("#bgB");
const bgUrl = f => `assets/bg_${f.id}.png`;

let current=0, locked=false, cart=0;
let activeWord=wordA, idleWord=wordB, activeDev=devA, idleDev=devB, activeBg=bgA, idleBg=bgB;
const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
const REST_YP = -24;   // device rests low: only the top ~70% of the body is visible

// ---- colour state for smooth tweening ----
const hexRgb = h => [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
let cur = { c1:hexRgb(FLAVOURS[0].c1), c2:hexRgb(FLAVOURS[0].c2), ink:hexRgb(FLAVOURS[0].ink), accent:hexRgb(FLAVOURS[0].accent) };
const rgb = a => `rgb(${a[0]|0},${a[1]|0},${a[2]|0})`;
function paint(){ const r=document.documentElement.style;
  r.setProperty("--c1",rgb(cur.c1)); r.setProperty("--c2",rgb(cur.c2));
  r.setProperty("--ink",rgb(cur.ink)); r.setProperty("--accent",rgb(cur.accent)); }
function tweenColours(f,dur){
  const from={c1:[...cur.c1],c2:[...cur.c2],ink:[...cur.ink],accent:[...cur.accent]};
  const to={c1:hexRgb(f.c1),c2:hexRgb(f.c2),ink:hexRgb(f.ink),accent:hexRgb(f.accent)};
  let pc=0;
  gsap.to({t:0},{t:1,duration:dur,ease:"power2.inOut",onUpdate:function(){
    const t=this.targets()[0].t;
    for(const k of ["c1","c2","ink","accent"])
      cur[k]=[0,1,2].map(i=>from[k][i]+(to[k][i]-from[k][i])*t);
    if(pc++ % 2 === 0 || t>=1) paint();   // ~30fps colour repaint (full-screen gradient) — invisible, halves cost
  }});
}

// randomise flavour order each load, then renumber sequentially by position
for(let i=FLAVOURS.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [FLAVOURS[i],FLAVOURS[j]]=[FLAVOURS[j],FLAVOURS[i]]; }
FLAVOURS.forEach((f,i)=>{ f.eyebrow="Crown Bar · "+String(i+1).padStart(2,"0"); });

// picker thumbnails = small lined-up vapes
FLAVOURS.forEach((f,i)=>{
  const b=document.createElement("button");
  b.className="pick"+(i===0?" active":""); b.dataset.i=i; b.title=f.word;
  const im=document.createElement("img"); im.src=f.img; im.alt=f.word;
  b.appendChild(im);
  b.addEventListener("click",()=>go(i));
  picksWrap.appendChild(b);
});

function setTitle(lines){
  title.replaceChildren();
  lines.forEach((ln,idx)=>{ if(idx) title.appendChild(document.createElement("br"));
    title.appendChild(document.createTextNode(ln)); });
}

const SPOTS=[{x:18,y:20},{x:82,y:16},{x:8,y:44},{x:90,y:38},{x:60,y:14},{x:50,y:78}];
function buildElements(f){
  elements.replaceChildren();   // emoji ingredients removed for now
}

function setActivePick(i){
  const picks=document.querySelectorAll(".pick");
  picks.forEach((p,idx)=>p.classList.toggle("active",idx===i));
  const el=picks[i]; if(el) el.scrollIntoView({block:"nearest",inline:"center"});
}

// ---- seamless smart-animate-style transition ----
function go(i){
  if(locked) return;
  i=(i+FLAVOURS.length)%FLAVOURS.length;
  if(i===current) return;
  locked=true;
  const dir = (i>current || (current===FLAVOURS.length-1 && i===0)) ? 1 : -1;
  const f=FLAVOURS[i];
  const dur=reduce?0.01:1.8;        // reel spec: ~2000ms
  const EB="back.inOut(1.1)";        // reel spec: "Ease in and out back"

  // colour morphs (drives chip/text accents)
  tweenColours(f,dur);

  // background image CROSSFADE (new flavour fades in over the old)
  idleBg.style.backgroundImage=`url("${bgUrl(f)}")`;
  gsap.set(idleBg,{ opacity:0, scale:1.06 });
  gsap.to(idleBg,{ opacity:1, scale:1, duration:dur, ease:"power2.inOut" });
  gsap.to(activeBg,{ opacity:0, scale:1.02, duration:dur, ease:"power2.inOut" });

  const slide = innerWidth*0.22;
  const rise = innerHeight*0.7;
  // device POPS UP FROM THE BOTTOM; the old one drops out the bottom
  idleDev.src=f.img;
  gsap.set(idleDev,{ opacity:1, xPercent:-50, yPercent:REST_YP, x:0, y:rise, scale:1, filter:"blur(0px)" });
  gsap.to(idleDev,{ y:0, duration:dur, ease:EB });
  gsap.to(activeDev,{ y:rise, opacity:0, duration:dur*0.55, ease:"power2.in" });

  // big word travels RIGHT -> LEFT: new enters from right, old exits left
  idleWord.textContent=f.word;
  gsap.set(idleWord,{ opacity:0, x:slide });
  gsap.to(idleWord,{ opacity:.32, x:0, duration:dur, ease:EB });
  gsap.to(activeWord,{ opacity:0, x:-slide, duration:dur, ease:EB });

  // ingredients DROP DOWN FROM THE TOP, at the same time as the device rises
  buildElements(f);
  gsap.set(".el",{ opacity:0, y:-(innerHeight*0.6) });
  gsap.to(".el",{ opacity:1, y:0, duration:dur, stagger:.05, ease:EB });

  // info crossfade
  gsap.to("#info > *",{ opacity:0, y:10, duration:dur*.3, stagger:.03, ease:"power2.in", onComplete:()=>{
    setTitle(f.name); desc.textContent=f.desc; jpname.textContent=f.jp;
    eyebrow.textContent=f.eyebrow; buyPrice.textContent="· "+f.price;
    gsap.fromTo("#info > *",{opacity:0,y:10},{opacity:1,y:0,duration:dur*.5,stagger:.05,ease:"power3.out"});
  }});

  setActivePick(i);

  gsap.delayedCall(dur,()=>{
    [activeDev,idleDev]=[idleDev,activeDev];
    [activeWord,idleWord]=[idleWord,activeWord];
    [activeBg,idleBg]=[idleBg,activeBg];
    current=i; locked=false;
  });
}

const next=()=>go(current+1), prev=()=>go(current-1);
$("#next").addEventListener("click",next);
$("#prev").addEventListener("click",prev);

addEventListener("keydown",e=>{
  if(["ArrowDown","ArrowRight"].includes(e.key)) next();
  if(["ArrowUp","ArrowLeft"].includes(e.key)) prev();
});

let wheelLock=false;
addEventListener("wheel",e=>{
  if(wheelLock||locked||Math.abs(e.deltaY)<8) return;
  wheelLock=true; e.deltaY>0?next():prev();
  setTimeout(()=>wheelLock=false,1900);
},{passive:true});

let sx=0,sy=0,down=false;
stage.addEventListener("pointerdown",e=>{down=true;sx=e.clientX;sy=e.clientY;});
addEventListener("pointerup",e=>{
  if(!down) return; down=false;
  const dx=e.clientX-sx, dy=e.clientY-sy;
  if(Math.abs(dx)>60||Math.abs(dy)>60){ (dx<0||dy<0)?next():prev(); }
});

$("#buy").addEventListener("click",()=>{ cart++; $("#cartCount").textContent=cart;
  gsap.fromTo("#buy",{scale:1},{scale:.94,duration:.1,yoyo:true,repeat:1,ease:"power2.inOut"}); });

// pseudo-spin: continuous 3D rotateY sway + gentle float (transform-only, GPU cheap)
if(!reduce){
  gsap.fromTo("#deviceFloat",{rotationY:-15},{rotationY:15,duration:3.0,ease:"sine.inOut",yoyo:true,repeat:-1});
  gsap.to("#deviceFloat",{y:"-=12",duration:3.4,ease:"sine.inOut",yoyo:true,repeat:-1});
}

// mouse parallax
if(!reduce){
  let mx=0,my=0,tx=0,ty=0;
  addEventListener("pointermove",e=>{ mx=(e.clientX/innerWidth-0.5); my=(e.clientY/innerHeight-0.5); });
  // parallax only writes when the pointer actually moves — zero idle repaints
  gsap.ticker.add(()=>{
    const dx=mx-tx, dy=my-ty;
    if(Math.abs(dx)<0.0006 && Math.abs(dy)<0.0006) return;
    tx+=dx*0.07; ty+=dy*0.07;
    gsap.set("#deviceWrap",{ x:tx*26 });
    gsap.set("#bigword",{ x:tx*-44, y:ty*-16 });
    gsap.set("#elements",{ x:tx*38, y:ty*22 });
  });
}

// preload device + background images so switches never hitch on decode
FLAVOURS.forEach(f=>{ new Image().src=f.img; new Image().src=bgUrl(f); });

// init
const f0=FLAVOURS[0];
gsap.set([devA,devB],{xPercent:-50,yPercent:REST_YP});   // device rests low (top ~70% visible)
gsap.set([wordA,wordB],{xPercent:-50,yPercent:-50});
bgA.style.backgroundImage=`url("${bgUrl(f0)}")`; gsap.set(bgA,{opacity:1});
paint(); buildElements(f0); setTitle(f0.name); jpname.textContent=f0.jp;
desc.textContent=f0.desc; buyPrice.textContent="· "+f0.price;
wordA.textContent=f0.word; gsap.set(wordA,{opacity:.32}); devA.src=f0.img;
gsap.set(devA,{opacity:1}); eyebrow.textContent=f0.eyebrow;
gsap.from(devA,{opacity:0,y:40,scale:.92,duration:1,ease:"power3.out"});
gsap.from(wordA,{opacity:0,duration:1.2,delay:.1});
gsap.fromTo(".el",{opacity:0,y:-(innerHeight*0.45)},{opacity:1,y:0,stagger:.06,duration:.9,delay:.2,ease:"back.out(1.4)"});
</script>
